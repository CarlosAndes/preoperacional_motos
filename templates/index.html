<!DOCTYPE html>
<html>

<head>

<body>
<div style="text-align:center;margin-bottom:20px;">

</div>
<div class='caja'>

<select id='encargado' onchange='mostrarOtro()'>

<option>Carlos Mario Osorio Taborda</option>
<option>Daniel Hernando Posada Gallego</option>
<option>Julian Andres Gonzalez Velasquez</option>
<option>Carlos Alberto Tamayo Camacho</option>
<option>Otro...</option>
</select><br>

NWJ76F

NWJ06F

XXK43G

<div id='panelVehiculo'

style='
margin-top:20px;
padding:25px;
background:#f4f4f4;
border-radius:15px;

display:flex;
align-items:center;
justify-content:center;
gap:30px;
flex-wrap:wrap;
'>

Información vehículo
</h3>

<img
id='fotoVehiculo'
src=''
width='260'

style='

padding:10px;
'
>

<div>

<p id='tipoMoto'>
Tipo: -
</p>

<p id='soatMoto'>
SOAT: -
</p>

<p id='tecnoMoto'>
Tecnomecánica: -
</p>

</div>

</div>

<div
style="
margin-top:15px;
padding:10px;
border-top:1px solid #ddd;
">




<input
placeholder='Kilometraje'
id='kilometraje'><br>


<label>Fecha y hora</label><br>
<input type='datetime-local' id='fecha' readonly><br><br>
<label>Tipo de moto</label>

<input
id='tipoSeleccionado'
readonly
placeholder='Se detectará automáticamente'>
<br><br>

<button
onclick='iniciarInspeccion()'>

▶ Iniciar inspección

</button>
<br><br>

</div>
<div id='resultado'></div>

<div id='resultadoExtra'></div>

<br>

<div class='caja'>

<h2
style='text-align:center'>

Resumen inspección

</h2>

<table
id='tablaResumen'

style='
width:100%;
border-collapse:collapse;
background:white;
'>

<thead>

<tr
style='
background:#007bff;
color:white;
'>

<th style='padding:15px'>
Paso
</th>

<th>
Parte
</th>

<th>
Estado
</th>

<th>
Observación
</th>

<th>
Foto
</th>

</tr>

</thead>

<tbody id='tablaEstados'>

</tbody>

</table>

</div>

<script>
const motoCambios="{{ url_for('static', filename='img/moto_cambios.jpeg') }}";
const motoAutomatica="{{ url_for('static', filename='img/moto_automatica.jpeg') }}";
let pasoActual=0;let secuencia=[];
let secuenciaCambios=[



{parte:'Llanta trasera',x:'88%',y:'73%'},      //1
{parte:'Llanta delantera',x:'7%',y:'73%'},     //2
{parte:'Luces',x:'28%',y:'57%'},               //3
{parte:'Direccionales',x:'15%',y:'48%'},       //4
{parte:'Motor',x:'52%',y:'48%'},               //5
{parte:'Cadena',x:'75%',y:'52%'},              //6
{parte:'Freno delantero',x:'15%',y:'60%'},     //7
{parte:'Freno trasero',x:'87%',y:'58%'},       //8
{parte:'Pedal cambios',x:'38%',y:'67%'},       //9
{parte:'Embrague',x:'26%',y:'14%'},            //10
{parte:'Tablero',x:'44%',y:'14%'},             //11
{parte:'Bocina',x:'31%',y:'33%'}               //12

];


let secuenciaAutomatica=[

{parte:'Llanta trasera',x:'88%',y:'73%'},      //1
{parte:'Llanta delantera',x:'7%',y:'73%'},     //2
{parte:'Luces',x:'10%',y:'56%'},               //3
{parte:'Direccionales',x:'16%',y:'47%'},       //4
{parte:'Motor',x:'54%',y:'48%'},               //5
{parte:'Freno delantero',x:'16%',y:'61%'},     //6
{parte:'Freno trasero',x:'82%',y:'60%'},       //7
{parte:'Transmisión CVT',x:'62%',y:'58%'},     //8
{parte:'Acelerador',x:'45%',y:'12%'},          //9
{parte:'Tablero',x:'35%',y:'12%'},             //10
{parte:'Bocina',x:'30%',y:'35%'}               //11

];

function mostrarMoto(tipo){

let encargado=document.getElementById('encargado').value;
let otroNombre=document.getElementById('otroNombre').value;
let documento=document.getElementById('documento').value;
let placa=document.getElementById('placa').value;
let kilometraje=document.getElementById('kilometraje').value;

if(encargado=='Seleccione encargado'){
alert('Seleccione encargado');
return;
}

if(encargado=='Otro...' && otroNombre==''){
alert('Escriba nombre');
return;
}

if(documento=='' || placa=='' || kilometraje==''){
alert('Complete todos los datos');
return;
}

let ahora=new Date();

ahora.setMinutes(
ahora.getMinutes()-ahora.getTimezoneOffset()
);

document.getElementById(
'fecha'
).value=

ahora.toISOString().slice(0,16);

pasoActual=0;

if(tipo=='cambios'){
secuencia=secuenciaCambios;
}

if(tipo=='automatica'){
secuencia=secuenciaAutomatica;
}

let imagen=

document.getElementById(
'fotoVehiculo'
).src


let html=
"<div class='motoContainer'><img src='"+imagen+"'>";

for(let i=0;i<secuencia.length;i++){

let clase=
i==0
?
'activo'
:
'bloqueado';

html+=`

<button
id='paso${i}'
class='punto ${clase}'
style='left:${secuencia[i].x};top:${secuencia[i].y}'
onclick='abrirPaso(${i})'>

${i+1}

</button>

`;

}

html+="</div>";

document.getElementById(
'resultado'
).innerHTML=html;

}



function abrirPaso(i){

if(i!=pasoActual){

alert(
'Debes seguir el orden'
);

return;

}

document.getElementById(
'resultadoExtra'
).innerHTML=

`<div class='caja'>

<h2
style='
color:#0066ff;
text-align:center;
'>

Paso ${i+1}

</h2>

<h3
style='
text-align:center;
font-size:24px;
margin-bottom:25px;
color:#333;
'>

${secuencia[i].parte}

</h3>

<select id='estado'>

<option>
🟢 Bueno
</option>

<option>
🟡 Observación
</option>

<option>
🔴 Falla
</option>

</select>

<br><br>

<textarea
id='observacion'

placeholder='✍️ Escriba observaciones si encuentra alguna novedad...'

style='
width:100%;
height:120px;
padding:15px;
border-radius:15px;
border:1px solid #dcdcdc;
font-size:16px;
resize:none;
box-sizing:border-box;
outline:none;
margin-top:10px;
'>
</textarea>
<br><br>

<input
type='file'
id='foto'
accept='image/*'
onchange='mostrarVista(event)'>

<br><br>

<img
id='preview'
width='150'
style='display:none;border-radius:10px'>

<br><br>

<button
onclick='guardar(${i})'>

Guardar registro

</button>

</div>`;

}



function guardar(i){

document.getElementById(
'paso'+i
).className='punto completado';


let estado=
document.getElementById(
'estado'
).value;


let observacion =
document.getElementById(
'observacion'
).value

||

'Sin observación';



let foto =
document.getElementById(
'foto'
).files[0]?.name

||

'Sin foto';



let tabla =

document.getElementById(
'tablaEstados'
);



tabla.innerHTML += `

<tr>

<td style="padding:12px;text-align:center">
${i+1}
</td>

<td style="padding:12px">
${secuencia[i].parte}
</td>

<td style="padding:12px">
${estado}
</td>

<td style="padding:12px">
${observacion}
</td>

<td style="padding:12px">
${foto}
</td>

</tr>

`;



let datos=
new FormData();


datos.append(
'fecha',
document.getElementById(
'fecha'
).value
);


datos.append(
'encargado',

document.getElementById(
'encargado'
).value
);


datos.append(
'documento',
document.getElementById(
'documento'
).value
);


datos.append(
'placa',
document.getElementById(
'placa'
).value
);


datos.append(
'kilometraje',
document.getElementById(
'kilometraje'
).value
);


datos.append(
'moto',

secuencia==
secuenciaCambios

?

'Cambios'

:

'Automática'

);


datos.append(
'parte',
secuencia[i].parte
);


datos.append(
'estado',
estado
);


datos.append(
'observacion',
observacion
);


let archivo=

document.getElementById(
'foto'
).files[0];


if(archivo){

datos.append(
'foto',
archivo
);

}


fetch(
'/guardar',
{
method:'POST',
body:datos
}
)

.then(
r=>r.json()
)

.then(data=>{

console.log(
'Guardado OK'
);

});


pasoActual++;


if(
pasoActual<
secuencia.length
){

document.getElementById(
'paso'+pasoActual
).className='punto activo';

setTimeout(

()=>abrirPaso(
pasoActual
),

900

);

}

else{

document.getElementById(
'resultadoExtra'
).innerHTML=

"<div class='caja'><h2>✅ Inspección finalizada</h2></div>";

}

}
function mostrarOtro(){

let encargado=
document.getElementById(
'encargado'
).value;

document.getElementById(
'otroNombre'
).style.display=

encargado=='Otro...'
?
'inline-block'
:
'none';

}


function mostrarVista(event){

let imagen=
document.getElementById(
'preview'
);

if(event.target.files[0]){

imagen.src=
URL.createObjectURL(
event.target.files[0]
);

imagen.style.display='block';

}

}

</script>
<script>

document
.getElementById(
'placa'
)

.addEventListener(

'change',

async function(){

let placa=this.value

if(!placa){

return

}

let respuesta=
await fetch(

'/vehiculo/'+placa

)

let datos=
await respuesta.json()


document
.getElementById(
'tipoMoto'
)
.innerText=

'Tipo: '+datos.tipo

document
.getElementById(
'tipoSeleccionado'
).value=

datos.tipo


let hoy = new Date()

let fechaSoat =
new Date(
datos.soat
)

let fechaTecno =
new Date(
datos.tecnomecanica
)


let diasSoat=

Math.ceil(

(fechaSoat-hoy)

/

(1000*60*60*24)

)


let diasTecno=

Math.ceil(

(fechaTecno-hoy)

/

(1000*60*60*24)

)



let textoSoat=

'🛡️ SOAT: '+datos.soat


if(
diasSoat<=365
){

textoSoat +=

' ⚠️ Vence en '

+

diasSoat

+

' días'

}


document
.getElementById(
'soatMoto'
)
.innerText=

textoSoat



let textoTecno=

'📋 Tecnomecánica: '

+

datos.tecnomecanica


if(
diasTecno<=365
){

textoTecno +=

' ⚠️ Vence en '

+

diasTecno

+

' días'

}


document
.getElementById(
'tecnoMoto'
)
.innerText=

textoTecno


let foto=

document.getElementById(
'fotoVehiculo'
)

foto.src=

'/static/vehiculos/'+
datos.foto


foto.style.display=
'block'


if(datos.tipo=='Automática'){

    mostrarMoto(
        'automatica'
    )

}

if(datos.tipo=='Cambios'){

    mostrarMoto(
        'cambios'
    )

}

})
function iniciarInspeccion(){

let tipo=

document.getElementById(
'tipoSeleccionado'
).value


if(tipo=='Automática'){

    mostrarMoto(
        'automatica'
    )

}


if(tipo=='Cambios'){

    mostrarMoto(
        'cambios'
    )

}

}


</script>



</body>
</html>
