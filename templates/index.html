<!DOCTYPE html>
<html>
<head>
<title>Preoperacional Escuela</title>
<link rel="stylesheet" href="{{ url_for('static', filename='css/estilos.css') }}">
<head>

<title>Preoperacional Escuela</title>

<meta name="viewport"
content="width=device-width, initial-scale=1.0">

<link rel="stylesheet"
href="{{ url_for('static', filename='css/estilos.css') }}">

</head>
</head>
<body>
<div style="text-align:center;margin-bottom:20px;">
<img src="{{ url_for('static', filename='img/suroede.jpg') }}" width="350" style="border-radius:10px;margin-bottom:10px;">
<h1>Preoperacional Autoescuela Suroeste</h1>
<p>Sistema de inspección preoperacional motocicletas</p>
</div>
<div class='caja'>
<h2>Datos inspección</h2>
<label>Encargado del día</label><br>
<select id='encargado' onchange='mostrarOtro()'>
<option>Seleccione encargado</option>
<option>Carlos Mario Osorio Taborda</option>
<option>Daniel Hernando Posada Gallego</option>
<option>Julian Andres Gonzalez Velasquez</option>
<option>Carlos Alberto Tamayo Camacho</option>
<option>Otro...</option>
</select><br>
<input placeholder='Escriba nombre' id='otroNombre' style='display:none'><br>
<input placeholder='Documento' id='documento'><br>
<input placeholder='Placa' id='placa' style='text-transform:uppercase' oninput='this.value=this.value.toUpperCase()'>
<input placeholder='Kilometraje' id='kilometraje'><br>
<label>Fecha y hora</label><br>
<input type='datetime-local' id='fecha' readonly><br><br>
<button class='btnMoto' onclick="mostrarMoto('cambios')">🏍️ Moto cambios</button>
<button class='btnMoto' onclick="mostrarMoto('automatica')">🛵 Moto automática</button>
</div>
<div id='resultado'></div><div id='resultadoExtra'></div><br>
<h2>Resumen inspección</h2>
<table border='1' width='1000'><tr><th>Paso</th><th>Parte</th><th>Estado</th><th>Observación</th><th>Foto</th></tr><tbody id='tablaEstados'></tbody></table>
<script>
const motoCambios="{{ url_for('static', filename='img/moto_cambios.jpeg') }}";
const motoAutomatica="{{ url_for('static', filename='img/moto_automatica.jpeg') }}";
let pasoActual=0;let secuencia=[];
let secuenciaCambios=[



{parte:'Llanta trasera',x:'88%',y:'73%'},      //1
{parte:'Llanta delantera',x:'7%',y:'73%'},     //2
{parte:'Luces',x:'28%',y:'57%'},               //3
{parte:'Direccionales',x:'15%',y:'48%'},       //4
{parte:'Motor',x:'52%',y:'48%'},               //5
{parte:'Cadena',x:'75%',y:'52%'},              //6
{parte:'Freno delantero',x:'15%',y:'60%'},     //7
{parte:'Freno trasero',x:'87%',y:'58%'},       //8
{parte:'Pedal cambios',x:'38%',y:'67%'},       //9
{parte:'Embrague',x:'26%',y:'14%'},            //10
{parte:'Tablero',x:'44%',y:'14%'},             //11
{parte:'Bocina',x:'31%',y:'33%'}               //12

];


let secuenciaAutomatica=[

{parte:'Llanta trasera',x:'88%',y:'73%'},      //1
{parte:'Llanta delantera',x:'7%',y:'73%'},     //2
{parte:'Luces',x:'10%',y:'56%'},               //3
{parte:'Direccionales',x:'16%',y:'47%'},       //4
{parte:'Motor',x:'54%',y:'48%'},               //5
{parte:'Freno delantero',x:'16%',y:'61%'},     //6
{parte:'Freno trasero',x:'82%',y:'60%'},       //7
{parte:'Transmisión CVT',x:'62%',y:'58%'},     //8
{parte:'Acelerador',x:'45%',y:'12%'},          //9
{parte:'Tablero',x:'35%',y:'12%'},             //10
{parte:'Bocina',x:'30%',y:'35%'}               //11

];

function mostrarMoto(tipo){

let encargado=document.getElementById('encargado').value;
let otroNombre=document.getElementById('otroNombre').value;
let documento=document.getElementById('documento').value;
let placa=document.getElementById('placa').value;
let kilometraje=document.getElementById('kilometraje').value;

if(encargado=='Seleccione encargado'){
alert('Seleccione encargado');
return;
}

if(encargado=='Otro...' && otroNombre==''){
alert('Escriba nombre');
return;
}

if(documento=='' || placa=='' || kilometraje==''){
alert('Complete todos los datos');
return;
}

let ahora=new Date();

ahora.setMinutes(
ahora.getMinutes()-ahora.getTimezoneOffset()
);

document.getElementById(
'fecha'
).value=

ahora.toISOString().slice(0,16);

pasoActual=0;

if(tipo=='cambios'){
secuencia=secuenciaCambios;
}

if(tipo=='automatica'){
secuencia=secuenciaAutomatica;
}

let imagen=
tipo=='cambios'
?
motoCambios
:
motoAutomatica;


let html=
"<div class='motoContainer'><img src='"+imagen+"'>";

for(let i=0;i<secuencia.length;i++){

let clase=
i==0
?
'activo'
:
'bloqueado';

html+=`

<button
id='paso${i}'
class='punto ${clase}'
style='left:${secuencia[i].x};top:${secuencia[i].y}'
onclick='abrirPaso(${i})'>

${i+1}

</button>

`;

}

html+="</div>";

document.getElementById(
'resultado'
).innerHTML=html;

}



function abrirPaso(i){

if(i!=pasoActual){

alert(
'Debes seguir el orden'
);

return;

}

document.getElementById(
'resultadoExtra'
).innerHTML=

`<div class='caja'>

<h2>
Paso ${i+1}
</h2>

<h3>
${secuencia[i].parte}
</h3>

<select id='estado'>

<option>
🟢 Bueno
</option>

<option>
🟡 Observación
</option>

<option>
🔴 Falla
</option>

</select>

<br>

<textarea
id='observacion'>
</textarea>

<br>

<input
type='file'
id='foto'
accept='image/*'
onchange='mostrarVista(event)'>

<br>

<img
id='preview'
width='150'
style='display:none;border-radius:10px'>

<br>

<button
onclick='guardar(${i})'>

Guardar registro

</button>

</div>`;

}



function guardar(i){

document.getElementById(
'paso'+i
).className='punto completado';


let estado=
document.getElementById(
'estado'
).value;


let observacion=
document.getElementById(
'observacion'
).value
||
'Sin observación';


let foto=
document.getElementById(
'foto'
).files[0]?.name
||
'Sin foto';


document.getElementById(
'tablaEstados'
).innerHTML+=

`

<tr>

<td>${i+1}</td>

<td>
${secuencia[i].parte}
</td>

<td>
${estado}
</td>

<td>
${observacion}
</td>

<td>
${foto}
</td>

</tr>

`;


let datos=
new FormData();


datos.append(
'fecha',
document.getElementById(
'fecha'
).value
);


datos.append(
'encargado',

document.getElementById(
'encargado'
).value
);


datos.append(
'documento',
document.getElementById(
'documento'
).value
);


datos.append(
'placa',
document.getElementById(
'placa'
).value
);


datos.append(
'kilometraje',
document.getElementById(
'kilometraje'
).value
);


datos.append(
'moto',

secuencia==
secuenciaCambios

?

'Cambios'

:

'Automática'

);


datos.append(
'parte',
secuencia[i].parte
);


datos.append(
'estado',
estado
);


datos.append(
'observacion',
observacion
);


let archivo=

document.getElementById(
'foto'
).files[0];


if(archivo){

datos.append(
'foto',
archivo
);

}


fetch(
'/guardar',
{
method:'POST',
body:datos
}
)

.then(
r=>r.json()
)

.then(data=>{

console.log(
'Guardado OK'
);

});


pasoActual++;


if(
pasoActual<
secuencia.length
){

document.getElementById(
'paso'+pasoActual
).className='punto activo';

setTimeout(

()=>abrirPaso(
pasoActual
),

500

);

}

else{

document.getElementById(
'resultadoExtra'
).innerHTML=

"<div class='caja'><h2>✅ Inspección finalizada</h2></div>";

}

}
function mostrarOtro(){

let encargado=
document.getElementById(
'encargado'
).value;

document.getElementById(
'otroNombre'
).style.display=

encargado=='Otro...'
?
'inline-block'
:
'none';

}


function mostrarVista(event){

let imagen=
document.getElementById(
'preview'
);

if(event.target.files[0]){

imagen.src=
URL.createObjectURL(
event.target.files[0]
);

imagen.style.display='block';

}

}

</script>
</body>
</html>
