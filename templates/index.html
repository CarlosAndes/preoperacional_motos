<!DOCTYPE html>
<html>
<head>
<title>Preoperacional Escuela</title>
<link rel="stylesheet" href="{{ url_for('static', filename='css/estilos.css') }}">
<style>
body{font-family:Arial,sans-serif;background:#f4f4f4;text-align:center;padding:20px}
.caja{width:750px;margin:auto;padding:20px;background:white;border-radius:15px;box-shadow:0 0 10px rgba(0,0,0,.1);margin-bottom:20px}
input,select,textarea{width:320px;padding:10px;margin:8px;border-radius:8px;border:1px solid #ccc}
textarea{height:100px;resize:none}
button{padding:10px 15px;border:none;border-radius:8px;cursor:pointer}
.btnMoto{background:#007bff;color:white}
.motoContainer{position:relative;width:700px;margin:auto}
.punto{position:absolute;width:40px;height:40px;border-radius:50%;font-weight:bold;color:white}
.bloqueado{background:gray}.activo{background:red}.completado{background:green}
table{background:white;border-collapse:collapse;margin:auto}
th,td{padding:10px}
</style>
</head>
<body>
<div style="text-align:center;margin-bottom:20px;">
<img src="{{ url_for('static', filename='img/suroede.jpg') }}" width="350" style="border-radius:10px;margin-bottom:10px;">
<h1>Preoperacional Autoescuela Suroeste</h1>
<p>Sistema de inspección preoperacional motocicletas</p>
</div>
<div class='caja'>
<h2>Datos inspección</h2>
<label>Encargado del día</label><br>
<select id='encargado' onchange='mostrarOtro()'>
<option>Seleccione encargado</option>
<option>Carlos Mario Osorio Taborda</option>
<option>Daniel Hernando Posada Gallego</option>
<option>Julian Andres Gonzalez Velasquez</option>
<option>Carlos Alberto Tamayo Camacho</option>
<option>Otro...</option>
</select><br>
<input placeholder='Escriba nombre' id='otroNombre' style='display:none'><br>
<input placeholder='Documento' id='documento'><br>
<input placeholder='Placa' id='placa' style='text-transform:uppercase' oninput='this.value=this.value.toUpperCase()'>
<input placeholder='Kilometraje' id='kilometraje'><br>
<label>Fecha y hora</label><br>
<input type='datetime-local' id='fecha' readonly><br><br>
<button class='btnMoto' onclick="mostrarMoto('cambios')">🏍️ Moto cambios</button>
<button class='btnMoto' onclick="mostrarMoto('automatica')">🛵 Moto automática</button>
</div>
<div id='resultado'></div><div id='resultadoExtra'></div><br>
<h2>Resumen inspección</h2>
<table border='1' width='1000'><tr><th>Paso</th><th>Parte</th><th>Estado</th><th>Observación</th><th>Foto</th></tr><tbody id='tablaEstados'></tbody></table>
<script>
const motoCambios="{{ url_for('static', filename='img/moto_cambios.jpg') }}";
const motoAutomatica="{{ url_for('static', filename='img/moto_automatica.jpeg') }}";
let pasoActual=0;let secuencia=[];
let secuenciaCambios=[{parte:'Llanta trasera',x:'590px',y:'420px'},{parte:'Llanta delantera',x:'70px',y:'420px'},{parte:'Luces',x:'120px',y:'190px'},{parte:'Direccionales',x:'140px',y:'220px'},{parte:'Motor',x:'320px',y:'200px'},{parte:'Cadena',x:'470px',y:'300px'},{parte:'Freno delantero',x:'80px',y:'320px'},{parte:'Freno trasero',x:'580px',y:'320px'},{parte:'Pedal cambios',x:'280px',y:'330px'},{parte:'Embrague',x:'230px',y:'130px'},{parte:'Tablero',x:'170px',y:'120px'},{parte:'Bocina',x:'250px',y:'180px'}];
let secuenciaAutomatica=[{parte:'Llanta trasera',x:'580px',y:'420px'},{parte:'Llanta delantera',x:'80px',y:'420px'},{parte:'Luces',x:'120px',y:'200px'},{parte:'Direccionales',x:'145px',y:'230px'},{parte:'Motor',x:'350px',y:'230px'},{parte:'Freno delantero',x:'90px',y:'330px'},{parte:'Freno trasero',x:'560px',y:'330px'},{parte:'Transmisión CVT',x:'430px',y:'300px'},{parte:'Acelerador',x:'220px',y:'130px'},{parte:'Tablero',x:'170px',y:'120px'},{parte:'Bocina',x:'260px',y:'180px'}];
function mostrarMoto(tipo){let encargado=document.getElementById('encargado').value;let otroNombre=document.getElementById('otroNombre').value;let documento=document.getElementById('documento').value;let placa=document.getElementById('placa').value;let kilometraje=document.getElementById('kilometraje').value;if(encargado=='Seleccione encargado'){alert('Seleccione encargado');return;}if(encargado=='Otro...'&&otroNombre==''){alert('Escriba nombre del encargado');return;}if(documento==''||placa==''||kilometraje==''){alert('Complete todos los datos');return;}let ahora=new Date();ahora.setMinutes(ahora.getMinutes()-ahora.getTimezoneOffset());document.getElementById('fecha').value=ahora.toISOString().slice(0,16);pasoActual=0;if(tipo=='cambios')secuencia=secuenciaCambios;if(tipo=='automatica')secuencia=secuenciaAutomatica;let imagen=tipo=='cambios'?motoCambios:motoAutomatica;let html="<div class='motoContainer'><img src='"+imagen+"' width='700'>";for(let i=0;i<secuencia.length;i++){let clase=i==0?'activo':'bloqueado';html+=`<button id='paso${i}' class='punto ${clase}' style='left:${secuencia[i].x};top:${secuencia[i].y}' onclick='abrirPaso(${i})'>${i+1}</button>`;}html+='</div>';document.getElementById('resultado').innerHTML=html;}
function abrirPaso(i){if(i!=pasoActual){alert('Debes seguir el orden');return;}document.getElementById('resultadoExtra').innerHTML=`<div class='caja'><h2>Paso ${i+1}</h2><h3>${secuencia[i].parte}</h3><select id='estado'><option>🟢 Bueno</option><option>🟡 Observación</option><option>🔴 Falla</option></select><br><textarea id='observacion'></textarea><br><input type='file' id='foto' accept='image/*' onchange='mostrarVista(event)'><br><img id='preview' width='150' style='display:none;border-radius:10px;border:1px solid gray;'><br><button onclick='guardar(${i})'>Guardar registro</button></div>`;}
function guardar(i){

let boton=event.target;

boton.disabled=true;


document.getElementById(
'paso'+i
).className='punto completado';


let estado=
document.getElementById(
'estado'
).value;


let observacion=
document.getElementById(
'observacion'
).value
||
'Sin observación';


let foto=
document.getElementById(
'foto'
).files[0]?.name
||
'Sin foto';


document.getElementById(
'tablaEstados'
).innerHTML+=

`<tr>
<td>${i+1}</td>
<td>${secuencia[i].parte}</td>
<td>${estado}</td>
<td>${observacion}</td>
<td>${foto}</td>
</tr>`;


let datos=new FormData();


datos.append(
'fecha',
document.getElementById(
'fecha'
).value
);

datos.append(
'encargado',
document.getElementById(
'encargado'
).value
);

datos.append(
'documento',
document.getElementById(
'documento'
).value
);

datos.append(
'placa',
document.getElementById(
'placa'
).value
);

datos.append(
'kilometraje',
document.getElementById(
'kilometraje'
).value
);


datos.append(

'moto',

secuencia==
secuenciaCambios

?

'Cambios'

:

'Automática'

);


datos.append(

'parte',

secuencia[i].parte

);


datos.append(

'estado',

estado

);


datos.append(

'observacion',

observacion

);


let archivo=

document.getElementById(
'foto'
).files[0];


if(
archivo
){

datos.append(
'foto',
archivo
);

}


fetch(
'/guardar',
{

method:'POST',

body:datos

})

.then(
r=>r.json()
)

.then(
data=>{

console.log(
data
);

});


pasoActual++;

if(
pasoActual<
secuencia.length
){

document.getElementById(
'paso'+pasoActual
)
.className='punto activo';

setTimeout(
()=>abrirPaso(
pasoActual
),
500
);

}

else{

document.getElementById(
'resultadoExtra'
).innerHTML=

"<div class='caja'><h2>✅ Inspección finalizada</h2></div>";

}

}{

let encargado=
document.getElementById(
'encargado'
).value;

document.getElementById(
'otroNombre'
).style.display=

encargado=='Otro...'

?

'inline-block'

:

'none';

}



function mostrarVista(event){

let imagen=
document.getElementById(
'preview'
);

imagen.src=

URL.createObjectURL(
event.target.files[0]);

imagen.style.display=
'block';

}

</script>
</body>
</html>
