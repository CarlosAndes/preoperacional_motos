<!DOCTYPE html>
<html>
<head>

<title>Preoperacional Escuela</title>

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link rel="stylesheet" href="{{ url_for('static', filename='css/estilos.css') }}">

<style>

body{
font-family:Arial,sans-serif;
background:#f4f4f4;
text-align:center;
padding:10px;
margin:0;
}

.caja{
width:95%;
max-width:750px;
margin:auto;
padding:20px;
background:white;
border-radius:20px;
box-shadow:0 0 15px rgba(0,0,0,.1);
margin-bottom:20px;
box-sizing:border-box;
}

input,
select,
textarea{

width:100%;
padding:14px;
margin:8px 0;
border-radius:10px;
border:1px solid #ccc;
box-sizing:border-box;
font-size:16px;

}

textarea{
height:100px;
resize:none;
}

button{
padding:14px;
border:none;
border-radius:10px;
cursor:pointer;
font-size:16px;
}

.btnMoto{
background:#007bff;
color:white;
width:100%;
margin-top:10px;
}

.motoContainer{
position:relative;
width:100%;
max-width:700px;
margin:auto;
}

.motoContainer img{
width:100%;
height:auto;
}

.punto{
position:absolute;
width:40px;
height:40px;
border-radius:50%;
font-weight:bold;
color:white;
border:none;
}

.bloqueado{background:gray}
.activo{background:red}
.completado{background:green}

table{
background:white;
border-collapse:collapse;
width:100%;
display:block;
overflow-x:auto;
}

th,td{
padding:10px;
font-size:14px;
}

@media(max-width:768px){

.caja{
width:98%;
padding:15px;
}

.motoContainer{
transform:scale(1.25);
transform-origin:top center;
margin-top:70px;
margin-bottom:120px;
}

.punto{
width:42px;
height:42px;
font-size:13px;
}

}

</style>

</head>

<body>

<div style="text-align:center;margin-bottom:20px;">

<img
src="{{ url_for('static', filename='img/suroede.jpg') }}"
style="width:100%;max-width:350px;border-radius:10px">

<h1>Preoperacional Autoescuela Suroeste</h1>

<p>Sistema de inspección preoperacional motocicletas</p>

</div>

<div class='caja'>

<h2>Datos inspección</h2>

<label>Encargado del día</label>

<select id='encargado' onchange='mostrarOtro()'>

<option>Seleccione encargado</option>
<option>Carlos Mario Osorio Taborda</option>
<option>Daniel Hernando Posada Gallego</option>
<option>Julian Andres Gonzalez Velasquez</option>
<option>Carlos Alberto Tamayo Camacho</option>
<option>Otro...</option>

</select>

<input
placeholder='Escriba nombre'
id='otroNombre'
style='display:none'>

<input placeholder='Documento' id='documento'>

<input
placeholder='Placa'
id='placa'
style='text-transform:uppercase'
oninput='this.value=this.value.toUpperCase()'>

<input placeholder='Kilometraje' id='kilometraje'>

<label>Fecha y hora</label>

<input
type='datetime-local'
id='fecha'
readonly>

<button class='btnMoto'
onclick="mostrarMoto('cambios')">

🏍️ Moto cambios

</button>

<button class='btnMoto'
onclick="mostrarMoto('automatica')">

🛵 Moto automática

</button>

</div>

<div id='resultado'></div>

<div id='resultadoExtra'></div>

<br>

<h2>Resumen inspección</h2>

<table border='1'>
<tr>
<th>Paso</th>
<th>Parte</th>
<th>Estado</th>
<th>Observación</th>
<th>Foto</th>
</tr>

<tbody id='tablaEstados'></tbody>

</table>

<script>

const motoCambios="{{ url_for('static', filename='img/moto_cambios.jpg') }}";

const motoAutomatica="{{ url_for('static', filename='img/moto_automatica.jpeg') }}";

let pasoActual=0;

let secuencia=[];

let secuenciaCambios=[

{parte:'Llanta delantera',x:'18%',y:'67%'},
{parte:'Llanta trasera',x:'82%',y:'67%'},
{parte:'Luces',x:'16%',y:'25%'},
{parte:'Direccionales',x:'22%',y:'34%'},
{parte:'Motor',x:'52%',y:'46%'}

];

let secuenciaAutomatica=[

{parte:'Llanta delantera',x:'17%',y:'67%'},
{parte:'Llanta trasera',x:'83%',y:'67%'},
{parte:'Luces',x:'16%',y:'30%'}

];

function mostrarOtro(){

let encargado=
document.getElementById(
'encargado'
).value;

document.getElementById(
'otroNombre'
).style.display=

encargado=='Otro...'

?

'block'

:

'none';

}

function mostrarMoto(tipo){

let ahora=new Date();

ahora.setMinutes(
ahora.getMinutes()
-
ahora.getTimezoneOffset()
);

document.getElementById(
'fecha'
).value=

ahora.toISOString().slice(0,16);

pasoActual=0;

secuencia=

tipo=='cambios'

?

secuenciaCambios

:

secuenciaAutomatica;

let imagen=

tipo=='cambios'

?

motoCambios

:

motoAutomatica;

let html="<div class='motoContainer'><img src='"+imagen+"'>";

for(let i=0;i<secuencia.length;i++){

let clase=i==0?'activo':'bloqueado';

html+=`<button id='paso${i}' class='punto ${clase}' style='left:${secuencia[i].x};top:${secuencia[i].y}' onclick='abrirPaso(${i})'>${i+1}</button>`;

}

html+='</div>';

document.getElementById(
'resultado'
).innerHTML=html;

}

function abrirPaso(i){

if(i!=pasoActual){

alert('Debes seguir el orden');

return;

}

document.getElementById(
'resultadoExtra'
).innerHTML=

`<div class='caja'>

<h2>Paso ${i+1}</h2>

<h3>${secuencia[i].parte}</h3>

<select id='estado'>
<option>🟢 Bueno</option>
<option>🟡 Observación</option>
<option>🔴 Falla</option>
</select>

<textarea id='observacion'></textarea>

<input
type='file'
id='foto'
accept='image/*'
onchange='mostrarVista(event)'>

<img
id='preview'
width='150'
style='display:none'>

<button onclick='guardar(${i})'>

Guardar registro

</button>

</div>`;

}

function guardar(i){

let datos=new FormData();

datos.append(
'fecha',
document.getElementById('fecha').value
);

datos.append(
'encargado',
document.getElementById('encargado').value
);

datos.append(
'documento',
document.getElementById('documento').value
);

datos.append(
'placa',
document.getElementById('placa').value
);

datos.append(
'kilometraje',
document.getElementById('kilometraje').value
);

datos.append(
'moto',
secuencia==secuenciaCambios?'Cambios':'Automática'
);

datos.append(
'parte',
secuencia[i].parte
);

datos.append(
'estado',
document.getElementById('estado').value
);

datos.append(
'observacion',
document.getElementById('observacion').value || 'Sin observación'
);

let archivo=document.getElementById('foto').files[0];

if(archivo){

datos.append(
'foto',
archivo
);

}

fetch('/guardar',{
method:'POST',
body:datos
})
.then(r=>r.json())
.then(data=>{

alert("Guardado");

});

}

function mostrarVista(event){

let imagen=
document.getElementById('preview');

imagen.src=
URL.createObjectURL(event.target.files[0]);

imagen.style.display='block';

}

</script>

</body>
</html>
