<!DOCTYPE html>
<html>
<head>
<title>Preoperacional Escuela</title>

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link rel="stylesheet"
href="{{ url_for('static', filename='css/estilos.css') }}">

<style>

body{
font-family:Arial,sans-serif;
background:#f4f4f4;
text-align:center;
padding:10px;
margin:0;
}

.caja{
width:95%;
max-width:750px;
margin:auto;
padding:15px;
background:white;
border-radius:20px;
box-shadow:0 0 15px rgba(0,0,0,.1);
margin-bottom:20px;
}

input,
select,
textarea,
button{

width:100%;
padding:14px;
margin:8px 0;
border-radius:10px;
border:1px solid #ccc;
box-sizing:border-box;
font-size:16px;

}

textarea{
height:100px;
resize:none;
}

button{
cursor:pointer;
border:none;
}

.btnMoto{
background:#007bff;
color:white;
font-weight:bold;
}

.motoContainer{
position:relative;
width:100%;
max-width:700px;
margin:auto;
}

.motoContainer img{
width:100%;
height:auto;
border-radius:15px;
}

.punto{
position:absolute;
width:35px;
height:35px;
border-radius:50%;
font-weight:bold;
font-size:12px;
color:white;
border:none;
}

.bloqueado{
background:gray;
}

.activo{
background:red;
}

.completado{
background:green;
}

table{
width:100%;
background:white;
border-collapse:collapse;
display:block;
overflow-x:auto;
font-size:12px;
}

th,td{
padding:10px;
}

@media(max-width:768px){

h1{
font-size:24px;
}

}

</style>

</head>

<body>

<div style="text-align:center;margin-bottom:20px;">

<img
src="{{ url_for('static', filename='img/suroede.jpg') }}"
style="width:100%;max-width:350px;border-radius:10px;">

<h1>Preoperacional Autoescuela Suroeste</h1>

<p>Sistema de inspección motocicletas</p>

</div>


<div class='caja'>

<h2>Datos inspección</h2>

<label>Encargado del día</label>

<select id='encargado'
onchange='mostrarOtro()'>

<option>Seleccione encargado</option>

<option>Carlos Mario Osorio Taborda</option>

<option>Daniel Hernando Posada Gallego</option>

<option>Julian Andres Gonzalez Velasquez</option>

<option>Carlos Alberto Tamayo Camacho</option>

<option>Otro...</option>

</select>

<input
placeholder='Escriba nombre'
id='otroNombre'
style='display:none'>

<input
placeholder='Documento'
id='documento'>

<input
placeholder='Placa'
id='placa'
style='text-transform:uppercase'
oninput='this.value=this.value.toUpperCase()'>

<input
placeholder='Kilometraje'
id='kilometraje'>

<label>Fecha y hora</label>

<input
type='datetime-local'
id='fecha'
readonly>

<br><br>

<button
class='btnMoto'
onclick="mostrarMoto('cambios')">

🏍️ Moto cambios

</button>

<button
class='btnMoto'
onclick="mostrarMoto('automatica')">

🛵 Moto automática

</button>

</div>


<div id='resultado'></div>

<div id='resultadoExtra'></div>

<br>

<h2>Resumen inspección</h2>

<table border='1'>

<tr>

<th>Paso</th>
<th>Parte</th>
<th>Estado</th>
<th>Observación</th>
<th>Foto</th>

</tr>

<tbody id='tablaEstados'></tbody>

</table>


<script>

const motoCambios="{{ url_for('static', filename='img/moto_cambios.jpg') }}";

const motoAutomatica="{{ url_for('static', filename='img/moto_automatica.jpeg') }}";

let pasoActual=0;

let secuencia=[];

let secuenciaCambios=[
{parte:'Llanta trasera',x:'590px',y:'420px'},
{parte:'Llanta delantera',x:'70px',y:'420px'},
{parte:'Luces',x:'120px',y:'190px'},
{parte:'Direccionales',x:'140px',y:'220px'},
{parte:'Motor',x:'320px',y:'200px'},
{parte:'Cadena',x:'470px',y:'300px'}
];

let secuenciaAutomatica=[
{parte:'Llanta trasera',x:'580px',y:'420px'},
{parte:'Llanta delantera',x:'80px',y:'420px'},
{parte:'Luces',x:'120px',y:'200px'},
{parte:'Direccionales',x:'145px',y:'230px'},
{parte:'Motor',x:'350px',y:'230px'}
];

function mostrarOtro(){

let encargado=
document.getElementById(
'encargado'
).value;

document.getElementById(
'otroNombre'
).style.display=

encargado=='Otro...'

?

'block'

:

'none';

}

function mostrarMoto(tipo){

let encargado=
document.getElementById(
'encargado'
).value;

if(
encargado==
'Seleccione encargado'
){

alert(
'Seleccione encargado'
);

return;

}

let ahora=new Date();

ahora.setMinutes(
ahora.getMinutes()
-
ahora.getTimezoneOffset()
);

document.getElementById(
'fecha'
).value=

ahora
.toISOString()
.slice(0,16);

pasoActual=0;

secuencia=

tipo=='cambios'

?

secuenciaCambios

:

secuenciaAutomatica;

let imagen=

tipo=='cambios'

?

motoCambios

:

motoAutomatica;

let html=

"<div class='motoContainer'><img src='"+imagen+"'>";

for(
let i=0;
i<secuencia.length;
i++
){

let clase=

i==0

?

'activo'

:

'bloqueado';

html+=

`<button
id='paso${i}'
class='punto ${clase}'
style='left:${secuencia[i].x};top:${secuencia[i].y}'
onclick='abrirPaso(${i})'>${i+1}</button>`;

}

html+='</div>';

document.getElementById(
'resultado'
).innerHTML=html;

}

function abrirPaso(i){

if(i!=pasoActual){

alert(
'Debes seguir orden'
);

return;

}

document.getElementById(
'resultadoExtra'
).innerHTML=

`<div class='caja'>

<h2>Paso ${i+1}</h2>

<h3>${secuencia[i].parte}</h3>

<select id='estado'>

<option>🟢 Bueno</option>
<option>🟡 Observación</option>
<option>🔴 Falla</option>

</select>

<textarea
id='observacion'></textarea>

<input
type='file'
id='foto'
accept='image/*'
onchange='mostrarVista(event)'>

<img
id='preview'
width='150'
style='display:none'>

<button
onclick='guardar(${i})'>

Guardar

</button>

</div>`;

}

function mostrarVista(event){

let imagen=
document.getElementById(
'preview'
);

imagen.src=
URL.createObjectURL(
event.target.files[0]
);

imagen.style.display='block';

}

</script>

</body>
</html>
